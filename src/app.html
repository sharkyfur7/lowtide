<!doctype html>
<html lang="en">
	<head>

		<meta lang="en-US" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		%sveltekit.head%

		<link rel="icon" href="%sveltekit.assets%/favicon.png" />

		<!-- Open Graph protocol stuff https://ogp.me/ -->

			%sveltekit.body%
		</div>
	</body>
</html>
